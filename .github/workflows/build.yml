name: Build BiliBC

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  VCPKG_DEFAULT_TRIPLET: x64-windows

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP\vcpkg" --depth 1
          & "$env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          echo "VCPKG_ROOT=$env:RUNNER_TEMP\vcpkg" >> $env:GITHUB_ENV

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          & "$env:RUNNER_TEMP\vcpkg\vcpkg.exe" install

      - name: Download mpv dev package
        shell: pwsh
        run: |
          # Query the GitHub API for the latest release from zhongfly/mpv-winbuild
          # and find the mpv-dev asset for x86_64
          $repos = @(
            "zhongfly/mpv-winbuild",
            "dyphire/mpv-winbuild"
          )

          $downloaded = $false
          foreach ($repo in $repos) {
            try {
              Write-Host "Querying latest release from $repo ..."
              $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/latest" `
                -Headers @{ "User-Agent" = "BiliBC-CI" }

              # Find the mpv-dev x86_64 asset (not v3, for broader compatibility)
              $asset = $release.assets | Where-Object {
                $_.name -match "mpv-dev-x86_64" -and $_.name -match "\.7z$"
              } | Select-Object -First 1

              if (!$asset) {
                # Try v3 variant
                $asset = $release.assets | Where-Object {
                  $_.name -match "mpv-dev" -and $_.name -match "x86_64" -and $_.name -match "\.7z$"
                } | Select-Object -First 1
              }

              if ($asset) {
                $url = $asset.browser_download_url
                Write-Host "Downloading: $url"
                Invoke-WebRequest -Uri $url -OutFile "mpv-dev.7z" -MaximumRetryCount 3
                $downloaded = $true
                Write-Host "Successfully downloaded $($asset.name)"
                break
              } else {
                Write-Host "No mpv-dev asset found in $repo latest release"
                Write-Host "Available assets:"
                $release.assets | ForEach-Object { Write-Host "  $($_.name)" }
              }
            } catch {
              Write-Host "Failed to query $repo`: $_"
            }
          }

          if (-not $downloaded) {
            # Last resort: try SourceForge
            try {
              Write-Host "Trying SourceForge fallback..."
              $url = "https://sourceforge.net/projects/mpv-player-windows/files/libmpv/mpv-dev-x86_64-20250929.7z/download"
              Invoke-WebRequest -Uri $url -OutFile "mpv-dev.7z" -MaximumRetryCount 3 -UserAgent "Mozilla/5.0"
              $downloaded = $true
            } catch {
              Write-Host "SourceForge also failed: $_"
            }
          }

          if (-not $downloaded) {
            Write-Error "Could not download mpv dev package from any source"
            exit 1
          }

          7z x "mpv-dev.7z" -ompv-dev -y
          Write-Host "=== mpv-dev contents ==="
          Get-ChildItem -Recurse mpv-dev | Select-Object FullName

      - name: Prepare mpv dev structure
        shell: pwsh
        run: |
          # Normalize directory structure: ensure include/mpv/ lib/ bin/ exist
          $root = "mpv-dev"

          # --- include/mpv ---
          $includeDir = "$root/include/mpv"
          if (!(Test-Path $includeDir)) {
            New-Item -ItemType Directory -Path $includeDir -Force | Out-Null
            Get-ChildItem -Path $root -Recurse -Filter "*.h" | ForEach-Object {
              Copy-Item $_.FullName $includeDir -Force
              Write-Host "  Copied header: $($_.Name)"
            }
          }
          Write-Host "Headers in $includeDir`:"
          Get-ChildItem $includeDir

          # --- lib/mpv.lib ---
          $libDir = "$root/lib"
          if (!(Test-Path $libDir)) { New-Item -ItemType Directory -Path $libDir -Force | Out-Null }

          if (!(Test-Path "$libDir/mpv.lib")) {
            # Strategy 1: existing .lib file
            $existingLib = Get-ChildItem -Path $root -Recurse -Filter "*.lib" | Select-Object -First 1
            if ($existingLib) {
              Copy-Item $existingLib.FullName "$libDir/mpv.lib" -Force
              Write-Host "Copied existing lib: $($existingLib.FullName)"
            }
            # Strategy 2: existing .def file
            elseif (($defFile = Get-ChildItem -Path $root -Recurse -Filter "*.def" | Select-Object -First 1)) {
              Write-Host "Generating mpv.lib from .def: $($defFile.FullName)"
              lib /def:"$($defFile.FullName)" /out:"$libDir/mpv.lib" /machine:x64
            }
            # Strategy 3: generate .def from DLL using dumpbin, then create .lib
            else {
              $dllFile = Get-ChildItem -Path $root -Recurse -Filter "libmpv*.dll" | Select-Object -First 1
              if (!$dllFile) {
                $dllFile = Get-ChildItem -Path $root -Recurse -Filter "*.dll" | Select-Object -First 1
              }
              if ($dllFile) {
                Write-Host "Generating .def from DLL: $($dllFile.FullName)"
                $defPath = "$libDir/mpv.def"

                # Use dumpbin to extract exports and build a .def file
                $exports = & dumpbin /exports "$($dllFile.FullName)" 2>$null
                $defContent = "LIBRARY `"libmpv-2.dll`"`nEXPORTS`n"
                $inExports = $false
                foreach ($line in $exports) {
                  if ($line -match "^\s+ordinal\s+hint\s+RVA\s+name") {
                    $inExports = $true
                    continue
                  }
                  if ($inExports -and $line -match "^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)") {
                    $defContent += "  $($Matches[1])`n"
                  }
                  if ($inExports -and $line -match "^\s*$" -and $defContent.Split("`n").Count -gt 3) {
                    break
                  }
                }

                Set-Content -Path $defPath -Value $defContent -Encoding ASCII
                Write-Host "Generated .def with $((Get-Content $defPath | Select-String -Pattern '^\s+\S').Count) exports"

                lib /def:"$defPath" /out:"$libDir/mpv.lib" /machine:x64
                Write-Host "Generated mpv.lib from DLL exports"
              } else {
                Write-Error "No DLL, .lib, or .def found for mpv"
                exit 1
              }
            }
          }
          Write-Host "mpv.lib exists: $(Test-Path "$libDir/mpv.lib")"

          # --- bin/libmpv-2.dll ---
          $binDir = "$root/bin"
          if (!(Test-Path $binDir)) { New-Item -ItemType Directory -Path $binDir -Force | Out-Null }

          if (!(Test-Path "$binDir/libmpv-2.dll")) {
            $dll = Get-ChildItem -Path $root -Recurse -Filter "libmpv*.dll" | Select-Object -First 1
            if (!$dll) {
              $dll = Get-ChildItem -Path $root -Recurse -Filter "*.dll" | Select-Object -First 1
            }
            if ($dll) {
              Copy-Item $dll.FullName "$binDir/libmpv-2.dll" -Force
              Write-Host "Copied DLL: $($dll.FullName)"
            }
          }

      - name: Configure CMake
        shell: pwsh
        run: |
          $mpvDir = (Resolve-Path "mpv-dev").Path
          cmake -B build `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_BUILD_TYPE=Release `
            -DMPV_DEV_DIR="$mpvDir"

      - name: Build
        run: cmake --build build --config Release

      - name: Package artifact
        shell: pwsh
        run: |
          $outDir = "BiliBC-Release"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null

          # Copy executable
          $exe = Get-ChildItem -Path build -Recurse -Filter "BiliBC.exe" | Select-Object -First 1
          if ($exe) { Copy-Item $exe.FullName $outDir }

          # Copy mpv DLL
          $mpvDll = Get-ChildItem -Path mpv-dev -Recurse -Filter "libmpv-2.dll" | Select-Object -First 1
          if ($mpvDll) { Copy-Item $mpvDll.FullName $outDir }

          # Copy vcpkg runtime DLLs (SDL2, FreeType, cJSON, zlib, bz2, png, brotli)
          $vcpkgBin = Get-ChildItem -Path build -Recurse -Directory -Filter "bin" |
            Where-Object { $_.FullName -match "vcpkg_installed" } | Select-Object -First 1
          if ($vcpkgBin) {
            Get-ChildItem "$($vcpkgBin.FullName)/*.dll" | ForEach-Object {
              Copy-Item $_.FullName $outDir
              Write-Host "  DLL: $($_.Name)"
            }
          }

          # Also check for DLLs next to the exe
          if ($exe) {
            Get-ChildItem "$($exe.DirectoryName)/*.dll" | ForEach-Object {
              Copy-Item $_.FullName $outDir -Force
            }
          }

          # Copy shaders and assets
          Copy-Item -Recurse "shaders" "$outDir/shaders"
          if (Test-Path "assets") { Copy-Item -Recurse "assets" "$outDir/assets" }

          Write-Host "`n=== Package contents ==="
          Get-ChildItem -Recurse $outDir | Select-Object FullName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BiliBC-Windows-x64
          path: BiliBC-Release/
          retention-days: 30
